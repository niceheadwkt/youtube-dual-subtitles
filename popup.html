<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 雙語字幕設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <div class="logo-glow"></div>
        <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,14.5v-5l4.5,2.5L10,14.5z"/>
        </svg>
        <span class="logo-title">Antigravity Dual Sub</span>
      </div>
      <div class="status-badge" id="status-badge">已啟用</div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Card 1: Toggle Extension -->
      <div class="settings-card toggle-card">
        <div class="card-info">
          <span class="card-title">啟用雙語字幕</span>
          <span class="card-desc">在影片中顯示第二種語言字幕</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="enable-toggle" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <!-- Card 2: Language Selection -->
      <div class="settings-card">
        <label class="card-label" for="target-language">目標翻譯語言</label>
        <div class="select-wrapper">
          <select id="target-language">
            <option value="zh-TW" selected>繁體中文 (Traditional Chinese)</option>
            <option value="zh-CN">簡體中文 (Simplified Chinese)</option>
            <option value="en">英文 (English)</option>
            <option value="ja">日本語 (Japanese)</option>
            <option value="ko">韓語 (Korean)</option>
            <option value="es">西班牙語 (Spanish)</option>
            <option value="fr">法語 (French)</option>
            <option value="de">德語 (German)</option>
            <option value="vi">越南語 (Vietnamese)</option>
            <option value="th">泰語 (Thai)</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" width="18" height="18">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </div>
      </div>

      <!-- Card 3: Font Size Control -->
      <div class="settings-card">
        <div class="slider-header">
          <span class="card-label">第二字幕大小</span>
          <span class="slider-value" id="font-size-val">20px</span>
        </div>
        <div class="range-wrapper">
          <input type="range" id="font-size" min="14" max="36" value="20" step="1">
        </div>
      </div>

      <!-- Card 4: Background Opacity -->
      <div class="settings-card">
        <div class="slider-header">
          <span class="card-label">字幕背景深淺</span>
          <span class="slider-value" id="bg-opacity-val">50%</span>
        </div>
        <div class="range-wrapper">
          <input type="range" id="bg-opacity" min="0" max="100" value="50" step="5">
        </div>
      </div>

      <!-- Card 5: Subtitle Download -->
      <div class="settings-card download-card">
        <label class="card-label">下載雙語字幕</label>
        <span class="card-desc" id="download-desc">正在偵測影片字幕...</span>
        
        <div id="download-controls" style="display: none; margin-top: 10px; width: 100%;">
          <div class="select-wrapper" style="margin-bottom: 10px;">
            <select id="download-source-lang">
              <!-- 字幕軌選項將由 JS 動態載入 -->
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" width="18" height="18">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          
          <div class="download-buttons">
            <button id="download-srt" class="btn btn-primary">下載 SRT (雙語字幕)</button>
            <button id="download-txt" class="btn btn-secondary">下載 TXT (逐字稿)</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>已連結至播放器</span>
      <span class="version">v1.0.0</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
